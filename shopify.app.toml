prefix = "apps"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "write_products,read_themes,write_files,read_orders,write_orders,read_customers"

[auth]
redirect_urls = [ "https://valvetronic-form.icecubedev.com/api/auth" ]

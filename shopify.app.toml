client_id = "f0d6b321c4656f11dfeb7953d26abff6"
name = "Product Waivers"
application_url = "https://valvetronic-form.icecubedev.com"
embedded = true

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2026-07"

[[webhooks.subscriptions]]
topics = ["orders/create"]
uri = "/webhooks/orders/create"

[app_proxy]
url = "https://valvetronic-form.icecubedev.com"
